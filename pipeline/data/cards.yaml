# ─────────────────────────────────────────────────────────────────────────────
#  WanderFree v1 catalog — the 25 cards we extract benefits for.
#  ----------------------------------------------------------------------------
#  Schema (per card):
#    slug              kebab-case stable identifier; mirrors cards.slug in DB
#    name              human display name
#    issuer            slug from `issuers` block below
#    network_tier      slug from `network_tiers` block, or null
#                      (Amex / Discover cards usually have null — their benefits
#                       are card-specific, not network-inherited)
#    is_business       true for SMB cards
#    annual_fee_cents  in cents. ⚠ APPROXIMATE — verify against the source
#                      doc on first extraction run, then update here
#    sources           list of fetch targets. kind: cfpb_agreement,
#                      marketing_page, or benefits_guide
#
#  ⚠ ALL source `url:` fields marked TODO are placeholders. The
#    source-acquisition module (next build phase) will either:
#      a) discover them programmatically from the issuer's site, or
#      b) be filled in here manually after one-time discovery
#    The marketing_page URLs are best-guess based on known issuer URL patterns
#    but should be sanity-checked before the first run.
# ─────────────────────────────────────────────────────────────────────────────

