name: Extract benefits

# Quarterly catalog refresh.
#
# Two ways to trigger:
#   • schedule: 8am UTC on the 1st of Jan / Apr / Jul / Oct
#   • workflow_dispatch: manual run via the Actions UI, with optional inputs
#     to filter to specific cards or to dry-run

on:
  schedule:
    - cron: "0 8 1 */3 *"
  workflow_dispatch:
    inputs:
      cards:
        description: "Comma-separated card slugs (leave blank for all 25)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — extract but don't write to Supabase"
        type: boolean
        default: false
      verbose:
        description: "Verbose (DEBUG) logging"
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 6h ceiling, way over our expected ~75min runtime

    permissions:
      contents: read           # we read cards.yaml; no writes back to the repo

    defaults:
      run:
        working-directory: pipeline

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      # Per CLAUDE.md preferences: per-project venv, explicit interpreter
      # paths (no `source activate`), tee install logs so a compile failure
      # near the top of pip output doesn't get hidden by the last summary line.
      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip 2>&1 | tee /tmp/pip-install.log
          .venv/bin/python -m pip install -e . 2>&1 | tee -a /tmp/pip-install.log

      - name: Verify install
        run: |
          .venv/bin/python -c "import extract; print('extract from:', extract.__file__)"
          .venv/bin/python -m scripts.dump_tool > /tmp/schema-smoke.log
          tail -5 /tmp/schema-smoke.log

      - name: Run extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.cards }}" ]; then
            ARGS="$ARGS --cards ${{ inputs.cards }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          .venv/bin/python -m extract.main $ARGS

      - name: Upload pip install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pip-install-log
          path: /tmp/pip-install.log
          if-no-files-found: ignore
